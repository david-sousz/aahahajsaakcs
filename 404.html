<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página não encontrada · Nekotina</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/theme.css">
</head>
<body class="min-h-screen flex items-center justify-center p-5">
  <div class="grid-noise"></div>
  <main class="app-shell max-w-4xl">
    <section class="hero-panel p-8 md:p-12 lg:p-14 text-center scale-in">
      <span class="brand-chip"><i data-lucide="triangle-alert"></i>Erro 404</span>
      <h1 class="section-title mt-6 text-[clamp(2.4rem,5vw,4.6rem)]">Página não encontrada.</h1>
      <p class="section-subtitle mt-5 max-w-2xl mx-auto">O endereço acessado não existe ou foi movido. Volte para o início e continue a navegação pelo ambiente principal.</p>
      <div class="flex flex-col sm:flex-row gap-3 justify-center mt-8">
        <a href="/" class="btn-primary"><i data-lucide="house"></i>Ir para a página inicial</a>
        <a href="/admin/" class="btn-secondary"><i data-lucide="shield"></i>Área administrativa</a>
      </div>
    </section>
  </main>
  <script>if (window.lucide) lucide.createIcons();</script>
</body>
</html>
